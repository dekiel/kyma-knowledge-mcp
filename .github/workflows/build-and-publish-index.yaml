name: Build and Publish Kyma Docs Index

on:
  schedule:
    - cron: "0 9 * * 6"  # Every Saturday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  ROLLING_RELEASE_TAG: "docs-index-latest"
  EMBED_MODEL: "BAAI/bge-base-en-v1.5"

jobs:
  check-doc-sources:
    name: Check for new and drifted doc sources, open PR if needed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync

      - name: Check for new and drifted doc sources, open PR if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if a doc-sources update PR already exists
          EXISTING_BRANCH=$(gh pr list --state open --json headRefName \
            --jq '[.[].headRefName | select(startswith("chore/doc-sources-update"))] | first // ""')

          if [ -n "$EXISTING_BRANCH" ]; then
            # Switch to the existing PR branch so scan runs on top of prior triage work
            git fetch origin "$EXISTING_BRANCH"
            git checkout "$EXISTING_BRANCH"
            BRANCH="$EXISTING_BRANCH"
          else
            BRANCH="chore/doc-sources-update-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
          fi

          # Run scan on current branch state — respects items already triaged on this branch
          uv run python scripts/check_missing_sources.py --auto-add
          DRIFT=$(uv run python scripts/check_source_drift.py --auto-fix 2>&1)
          echo "$DRIFT"

          if git diff --quiet kyma_knowledge_mcp/indexing/docs_sources.json; then
            echo "No new changes to docs_sources.json — PR is already up to date."
            exit 0
          fi

          git add kyma_knowledge_mcp/indexing/docs_sources.json
          git commit -m "chore: auto-update doc sources (new repos + drift fixes)"
          git push --force-with-lease origin "$BRANCH"

          # Only create the PR on first run; subsequent runs just update the branch
          if [ -z "$EXISTING_BRANCH" ]; then
            {
              echo "This PR was auto-generated by the weekly index build workflow."
              echo ""
              echo "Both new repo discovery and drift detection ran and applied conservative fixes to \`docs_sources.json\`."
              echo ""
              echo "**Review the diff**, then use \`/triage-kyma-doc-sources\` to:"
              echo "- Remove internal tooling repos"
              echo "- Adjust \`include_files\` patterns"
              echo "- Confirm correct \`collection\` (user/contributor)"
              echo ""
              if echo "$DRIFT" | grep -qE "NEW_PATH|DEAD|MISSING_DEV"; then
                echo "## Drift findings (auto-applied)"
                echo ""
                echo "\`\`\`"
                echo "$DRIFT"
                echo "\`\`\`"
              fi
            } > /tmp/pr-body.txt

            gh pr create \
              --title "chore: add newly discovered Kyma docs" \
              --body-file /tmp/pr-body.txt \
              --base main \
              --head "$BRANCH"
          else
            echo "Updated existing PR branch: $BRANCH"
          fi

  build-index:
    name: Build ChromaDB index and publish to rolling release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync

      - name: Ensure rolling release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ env.ROLLING_RELEASE_TAG }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release create "${{ env.ROLLING_RELEASE_TAG }}" \
              --repo "${{ github.repository }}" \
              --title "Latest Kyma Docs Index" \
              --notes "Auto-updated weekly. Contains the latest ChromaDB index of Kyma documentation." \
              --prerelease
          fi

      - name: Fetch and index Kyma documentation
        run: |
          uv run kyma-knowledge-mcp-build-index \
            --sources kyma_knowledge_mcp/indexing/docs_sources.json \
            --data-dir ./data \
            --tmp-dir ./tmp \
            --output-dir ./chroma_index \
            --embed-model "${{ env.EMBED_MODEL }}" \
            --package kyma-docs-index.tar.gz \
            --log-level INFO

      - name: Validate index
        run: |
          uv run python - <<'EOF'
          import sys
          import chromadb

          client = chromadb.PersistentClient(path="./chroma_index")
          counts = {c.name: client.get_collection(c.name).count() for c in client.list_collections()}

          for name, count in counts.items():
              print(f"{name}: {count} docs")

          user_count = counts.get("kyma_docs", 0)
          contrib_count = counts.get("kyma_contributor_docs", 0)

          if user_count < 2000:
              print(f"ERROR: kyma_docs too small ({user_count} < 2000) — index build likely failed")
              sys.exit(1)
          if contrib_count < 200:
              print(f"ERROR: contributor collection too small ({contrib_count} < 200) — index build likely failed")
              sys.exit(1)

          print("Validation passed.")
          EOF

      - name: Upload index to rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.ROLLING_RELEASE_TAG }}" kyma-docs-index.tar.gz --clobber
